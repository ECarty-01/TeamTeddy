<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bloom Music Checker — Results</title>
<style>
  :root{
    --bg:#f7fbf9; --muted:#6b6f76;
    --mint:#8fd19e; --leaf:#2f8a5e; --lavender:#caa6ff; --pink:#ffb6d2; --sun:#ffd27a;
    --shadow:0 12px 30px rgba(10,12,14,0.06);
  }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#f3f7ff,#f7fbf9);color:#123}
  .wrap{max-width:980px;margin:28px auto;padding:18px;border-radius:16px;background:linear-gradient(180deg,#fff,#fffefc);box-shadow:var(--shadow)}
  h2{margin:0}
  .muted{color:var(--muted)}
  .score{display:flex;align-items:center;gap:18px;margin-top:12px}
  .big{font-size:48px;font-weight:800;color:var(--leaf)}
  .noteList{margin-top:14px;border-radius:10px;overflow:hidden}
  .noteRow{display:flex;gap:12px;padding:10px;background:linear-gradient(180deg,#fff,#fffefc);border-bottom:1px solid rgba(0,0,0,0.03);align-items:center}
  .dot{width:14px;height:14px;border-radius:50%}
  .dot.ok{background:var(--leaf)}
  .dot.bad{background:#ef4444}
  .btn{padding:10px 14px;border-radius:10px;border:none;background:linear-gradient(90deg,var(--lavender),var(--pink));color:#2b1730;font-weight:700;cursor:pointer}
</style>
</head>
<body>
  <main class="wrap">
    <header style="display:flex;align-items:center;gap:12px">
      <div style="width:64px;height:64px;border-radius:12px;background:linear-gradient(135deg,var(--mint),var(--leaf));display:flex;align-items:center;justify-content:center;color:white;font-weight:700">B</div>
      <div>
        <h2>Results</h2>
        <div class="muted">Summary of your session and per-note feedback.</div>
      </div>
      <a style="margin-left:auto;color:var(--muted);text-decoration:none" href="index.html">Menu</a>
    </header>

    <div id="summary"></div>

    <div style="margin-top:12px">
      <button id="backToMenu" class="btn">Main Menu</button>
      <button id="retryPlay" class="btn" style="background:linear-gradient(90deg,var(--sun),#ffd9b3);margin-left:8px">Retry Play</button>
    </div>

    <div id="details"></div>
  </main>

<script>
  const results = JSON.parse(localStorage.getItem('musicCheckerResults') || 'null');
  const summary = document.getElementById('summary');
  const details = document.getElementById('details');
  const back = document.getElementById('backToMenu');
  const retry = document.getElementById('retryPlay');

  back.addEventListener('click', ()=> location.href='index.html');
  retry.addEventListener('click', ()=> location.href='play.html');

  if(!results){
    summary.innerHTML = '<div class="muted" style="margin-top:12px">No results found. Run a session first.</div>';
  } else {
    const {total, correct, pct, perNote} = results;
    const grade = getGrade(pct);
    summary.innerHTML = `
      <div class="score">
        <div class="big">${pct}%</div>
        <div>
          <div style="font-weight:700">${correct}/${total} correct</div>
          <div class="muted">${grade.label} — ${grade.desc}</div>
        </div>
      </div>
      <div style="margin-top:12px;display:flex;gap:12px">
        <div style="display:flex;align-items:center;gap:8px"><div style="width:12px;height:12px;border-radius:50%;background:var(--leaf)"></div><div class="muted">Correct</div></div>
        <div style="display:flex;align-items:center;gap:8px"><div style="width:12px;height:12px;border-radius:50%;background:#ef4444"></div><div class="muted">Wrong</div></div>
      </div>
    `;

    const rows = perNote.map((p,i)=>`
      <div class="noteRow">
        <div style="width:40px;text-align:center">${i+1}</div>
        <div style="flex:1"><strong>${p.note}</strong><div class="muted" style="font-size:13px">tries: ${p.tries}</div></div>
        <div style="width:14px;height:14px;border-radius:50%" class="${p.ok ? 'dot ok' : 'dot bad'}"></div>
      </div>
    `).join('');
    details.innerHTML = `<div class="noteList" style="margin-top:14px">${rows}</div>`;
  }

  function getGrade(pct){
    if(pct>=100) return {label:'Perfect', desc:'100% — flawless'};
    if(pct>=90) return {label:'Excellent', desc:'90% — very accurate'};
    if(pct>=70) return {label:'Good', desc:'70% — solid performance'};
    if(pct>=40) return {label:'Bad', desc:'40% — needs work'};
    return {label:'Horrible', desc:'20% — try again'};
  }
</script>
</body>
</html>
