<!-- results.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Music Checker — Results</title>
  <style>
    :root{--bg:#071029;--card:#071827;--accent:#7c3aed;--muted:#9aa4b2;--ok:#16a34a;--bad:#ef4444}
    body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:var(--bg);color:#e6eef6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px}
    .wrap{width:min(980px,96%);background:rgba(255,255,255,0.03);padding:18px;border-radius:12px}
    .score{display:flex;align-items:center;gap:18px}
    .big{font-size:48px;font-weight:700}
    .muted{color:var(--muted)}
    .legend{display:flex;gap:12px;margin-top:12px}
    .noteList{margin-top:14px;border-radius:8px;overflow:hidden}
    .noteRow{display:flex;gap:12px;padding:10px;background:#021226;border-bottom:1px solid rgba(255,255,255,0.02);align-items:center}
    .dot{width:14px;height:14px;border-radius:50%}
    .dot.ok{background:var(--ok)}
    .dot.bad{background:var(--bad)}
    .btn{background:var(--accent);color:#071827;padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
  </style>
</head>
<body>
  <main class="wrap">
    <h2 style="margin:0">Results</h2>
    <div id="summary" style="margin-top:12px"></div>

    <div style="margin-top:12px">
      <button id="backToMenu" class="btn">Main Menu</button>
      <button id="retryPlay" class="btn" style="margin-left:8px;background:#334155">Retry Play</button>
    </div>

    <div id="details" style="margin-top:14px"></div>
  </main>

  <script>
    const results = JSON.parse(localStorage.getItem('musicCheckerResults') || 'null');
    const summary = document.getElementById('summary');
    const details = document.getElementById('details');
    const back = document.getElementById('backToMenu');
    const retry = document.getElementById('retryPlay');

    back.addEventListener('click', ()=> location.href='index.html');
    retry.addEventListener('click', ()=> location.href='play.html');

    if(!results){
      summary.innerHTML = '<div class="muted">No results found. Run a session first.</div>';
    } else {
      const {total, correct, pct, perNote} = results;
      const grade = getGrade(pct);
      summary.innerHTML = `
        <div class="score">
          <div class="big">${pct}%</div>
          <div>
            <div style="font-weight:600">${correct}/${total} correct</div>
            <div class="muted">${grade.label} — ${grade.desc}</div>
          </div>
        </div>
        <div class="legend">
          <div style="display:flex;align-items:center;gap:8px"><div style="width:12px;height:12px;border-radius:50%;background:#16a34a"></div><div class="muted">Correct</div></div>
          <div style="display:flex;align-items:center;gap:8px"><div style="width:12px;height:12px;border-radius:50%;background:#ef4444"></div><div class="muted">Wrong</div></div>
        </div>
      `;

      // per-note list
      const rows = perNote.map((p,i)=>`
        <div class="noteRow">
          <div style="width:40px;text-align:center">${i+1}</div>
          <div style="flex:1"><strong>${p.note}</strong><div class="muted" style="font-size:13px">tries: ${p.tries}</div></div>
          <div style="width:14px;height:14px;border-radius:50%" class="${p.ok ? 'dot ok' : 'dot bad'}"></div>
        </div>
      `).join('');
      details.innerHTML = `<div class="noteList">${rows}</div>`;
    }

    function getGrade(pct){
      if(pct>=100) return {label:'Perfect', desc:'100% — flawless'};
      if(pct>=90) return {label:'Excellent', desc:'90% — very accurate'};
      if(pct>=70) return {label:'Good', desc:'70% — solid performance'};
      if(pct>=40) return {label:'Bad', desc:'40% — needs work'};
      return {label:'Horrible', desc:'20% — try again'};
    }
  </script>
</body>
</html>
