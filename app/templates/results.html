<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bloom Music Checker — Results</title>
<style>
  :root{
    --bg:#f7fbf9; --muted:#6b6f76;
    --mint:#8fd19e; --leaf:#2f8a5e; --lavender:#caa6ff; --pink:#ffb6d2; --sun:#ffd27a;
    --shadow:0 18px 50px rgba(10,12,14,0.06);
  }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#f3f7ff,#f7fbf9);color:#123}
  .wrap{max-width:1200px;margin:36px auto;padding:28px;border-radius:18px;background:linear-gradient(180deg,#fff,#fffefc);box-shadow:var(--shadow)}
  header{display:flex;align-items:center;gap:18px;margin-bottom:12px}
  h2{margin:0;font-size:24px}
  .muted{color:var(--muted);font-size:15px}
  .score{display:flex;align-items:center;gap:22px;margin-top:12px}
  .big{font-size:64px;font-weight:900;color:var(--leaf);line-height:1}
  .noteList{margin-top:18px;border-radius:12px;overflow:hidden}
  .noteRow{display:flex;gap:16px;padding:14px;background:linear-gradient(180deg,#fff,#fffefc);border-bottom:1px solid rgba(0,0,0,0.03);align-items:center}
  .dot{width:18px;height:18px;border-radius:50%}
  .dot.ok{background:var(--leaf)}
  .dot.bad{background:#ef4444}
  .btn{padding:12px 16px;border-radius:12px;border:none;background:linear-gradient(90deg,var(--lavender),var(--pink));color:#2b1730;font-weight:800;cursor:pointer;font-size:15px}
  .btn.secondary{background:linear-gradient(90deg,var(--sun),#ffd9b3)}
  .logo{width:84px;height:84px;border-radius:14px;background:#ffffff;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(47,138,94,0.18);overflow:hidden;padding:8px;box-sizing:border-box}
  .logo img{width:100%;height:100%;object-fit:contain}
</style>
</head>
<body>
  <main class="wrap">
    <header>
      <div class="logo">
        <img src="{{ url_for('static', filename='RJ_Logo.jpg') }}" alt="Rhythm Judge logo" />
      </div>
      <div>
        <h2>Results</h2>
        <div class="muted">Summary of your session and per-note feedback.</div>
      </div>
      <a style="margin-left:auto;color:var(--muted);text-decoration:none;font-size:15px" href="{{ url_for('api.home') }}">Menu</a>
    </header>

    <div id="summary"></div>

    <div style="margin-top:18px">
      <button id="backToMenu" class="btn">Main Menu</button>
      <button id="retryPlay" class="btn secondary" style="margin-left:12px">Retry Play</button>
    </div>

    <div id="details"></div>
  </main>

<script>
  const results = JSON.parse(localStorage.getItem('musicCheckerResults') || 'null');
  const summary = document.getElementById('summary');
  const details = document.getElementById('details');
  const back = document.getElementById('backToMenu');
  const retry = document.getElementById('retryPlay');

  back.addEventListener('click', ()=> location.href="{{ url_for('api.home') }}");
  retry.addEventListener('click', ()=> location.href="{{ url_for('api.play_page') }}");

  if(!results){
    summary.innerHTML = '<div class="muted" style="margin-top:18px">No results found. Run a session first.</div>';
  } else {
    const {total, correct, pct, perNote} = results;
    const grade = getGrade(pct);
    summary.innerHTML = `
      <div class="score">
        <div class="big">${pct}%</div>
        <div>
          <div style="font-weight:800;font-size:18px">${correct}/${total} correct</div>
          <div class="muted" style="margin-top:6px">${grade.label} — ${grade.desc}</div>
        </div>
      </div>
      <div style="margin-top:16px;display:flex;gap:18px">
        <div style="display:flex;align-items:center;gap:10px"><div style="width:14px;height:14px;border-radius:50%;background:var(--leaf)"></div><div class="muted">Correct</div></div>
        <div style="display:flex;align-items:center;gap:10px"><div style="width:14px;height:14px;border-radius:50%;background:#ef4444"></div><div class="muted">Wrong</div></div>
      </div>
    `;

    const rows = perNote.map((p,i)=>`
      <div class="noteRow">
        <div style="width:48px;text-align:center;font-weight:700">${i+1}</div>
        <div style="flex:1"><strong style="font-size:16px">${p.note}</strong><div class="muted" style="font-size:13px;margin-top:6px">tries: ${p.tries}</div></div>
        <div style="width:18px;height:18px;border-radius:50%" class="${p.ok ? 'dot ok' : 'dot bad'}"></div>
      </div>
    `).join('');
    details.innerHTML = `<div class="noteList" style="margin-top:18px">${rows}</div>`;
  }

  function getGrade(pct){
    if(pct>=100) return {label:'Perfect', desc:'100% — flawless'};
    if(pct>=90) return {label:'Excellent', desc:'90% — very accurate'};
    if(pct>=70) return {label:'Good', desc:'70% — solid performance'};
    if(pct>=40) return {label:'Bad', desc:'40% — needs work'};
    return {label:'Horrible', desc:'20% — try again'};
  }
</script>
</body>
</html>
