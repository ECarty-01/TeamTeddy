<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bloom Music Checker — Upload</title>
<style>
  :root{
    --paper:#fffefc; --muted:#6b6f76;
    --mint:#8fd19e; --leaf:#2f8a5e; --lavender:#caa6ff; --pink:#ffb6d2; --sun:#ffd27a;
    --shadow:0 18px 50px rgba(10,12,14,0.06);
  }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#f7fbf9,#f3f7ff);color:#123}
  .wrap{max-width:1200px;margin:36px auto;padding:36px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,0.98),rgba(255,255,255,0.95));box-shadow:var(--shadow);position:relative}
  header{display:flex;align-items:center;gap:18px;margin-bottom:18px}
  .brand{width:84px;height:84px;border-radius:14px;background:#ffffff;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(47,138,94,0.18);overflow:hidden;padding:8px;box-sizing:border-box}
  .brand img{width:100%;height:100%;object-fit:contain}
  h2{margin:0;font-size:26px}
  .muted{color:var(--muted);font-size:15px}
  .row{display:flex;gap:14px;align-items:center;margin-top:18px;flex-wrap:wrap}
  input[type=file]{padding:12px;border-radius:12px;border:1px solid rgba(0,0,0,0.04);background:#fff;cursor:pointer}
  input[type=number]{padding:12px;border-radius:12px;border:1px solid #e6e9ee;width:120px}
  .btn{background:linear-gradient(90deg,var(--lavender),var(--pink));padding:12px 16px;border-radius:12px;border:none;color:#2b1730;font-weight:800;cursor:pointer;font-size:15px;transition:opacity 0.2s}
  .btn:hover{opacity:0.9}
  .btn:disabled{opacity:0.5;cursor:not-allowed}
  .btn.secondary{background:linear-gradient(90deg,var(--sun),#ffd9b3)}
  textarea{width:100%;height:220px;border-radius:14px;padding:16px;border:1px solid #e6e9ee;margin-top:18px;background:#fff;font-size:15px;font-family:monospace;resize:vertical}
  .notePreview{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-top:18px}
  .noteCard{background:linear-gradient(180deg,#fff,#fffefc);padding:14px;border-radius:12px;border:1px solid rgba(0,0,0,0.03);font-size:15px}
  .back{margin-left:auto;color:var(--muted);text-decoration:none;font-size:15px;padding:8px 12px;border-radius:8px}
  .back:hover{background:rgba(0,0,0,0.05)}
  .error{color:#ef4444;margin-top:12px;padding:12px;border-radius:8px;background:#fef2f2}
  .success{color:var(--leaf);margin-top:12px;padding:12px;border-radius:8px;background:#f0fdf4}
</style>
</head>
<body>
  <main class="wrap">
    <header>
      <div class="brand">
        <img src="{{ url_for('static', filename='RJ_Logo.jpg') }}" alt="Rhythm Judge logo" />
      </div>
      <div>
        <h2>Upload Notes</h2>
        <div class="muted">Supported: JSON with notes array, CSV (time,note), or PDF sheet music. Set BPM if needed.</div>
      </div>
      <a class="back" href="{{ url_for('api.home') }}">Back</a>
    </header>

    <div class="row">
      <input id="file" type="file" accept=".json,.csv,.pdf,application/pdf" />
      <label class="muted" for="bpm">BPM</label>
      <input id="bpm" type="number" value="120" min="20" max="400" />
      <button id="parse" class="btn">Parse</button>
      <button id="save" class="btn secondary" disabled>Save & Play</button>
    </div>

    <div id="message"></div>

    <textarea id="preview" placeholder="Parsed notes preview will appear here or paste JSON/CSV directly..."></textarea>

    <div id="notesTable" style="display:none">
      <div style="margin-top:18px;font-weight:700;font-size:16px">Notes Preview</div>
      <div class="notePreview" id="notePreview"></div>
    </div>
  </main>

<script>
  const fileInput = document.getElementById('file');
  const parseBtn = document.getElementById('parse');
  const preview = document.getElementById('preview');
  const bpmInput = document.getElementById('bpm');
  const notePreview = document.getElementById('notePreview');
  const notesTable = document.getElementById('notesTable');
  const saveBtn = document.getElementById('save');
  const messageDiv = document.getElementById('message');

  let currentNotes = null;

  function showError(msg){
    messageDiv.innerHTML = `<div class="error">${msg}</div>`;
  }

  function showSuccess(msg){
    messageDiv.innerHTML = `<div class="success">${msg}</div>`;
  }

  function parseCSV(text){
    const lines = text.trim().split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    const notes = [];
    for(let line of lines){
      if(!line || line.startsWith('#')) continue;
      const [timeStr, ...noteParts] = line.split(',');
      const t = parseFloat(timeStr.trim());
      const n = noteParts.join(',').trim();
      if(!isNaN(t) && n) notes.push({time: t, note: n});
    }
    return notes.length ? notes : null;
  }

  function parseJSON(text){
    try{
      const obj = JSON.parse(text);
      if(Array.isArray(obj.notes)){
        return obj.notes.map(n=>({time: Number(n.time), note: String(n.note)}));
      }
      if(Array.isArray(obj)){
        return obj.map(n=>({time: Number(n.time || n.t || 0), note: String(n.note || n.n || '')}));
      }
    }catch(e){}
    return null;
  }

  function renderNotesPreview(notes){
    notePreview.innerHTML = '';
    notes.slice(0, 20).forEach((n,i)=>{
      const d = document.createElement('div');
      d.className = 'noteCard';
      d.innerHTML = `<div><strong>${n.note}</strong></div><div style="font-size:12px;color:#6b6f76">t=${n.time}s</div>`;
      notePreview.appendChild(d);
    });
    if(notes.length > 20){
      const d = document.createElement('div');
      d.className = 'noteCard';
      d.style.textAlign = 'center';
      d.innerHTML = `<strong>+${notes.length - 20} more</strong>`;
      notePreview.appendChild(d);
    }
    notesTable.style.display = '';
  }

  parseBtn.addEventListener('click', async ()=>{
    messageDiv.innerHTML = '';
    
    if(!fileInput.files.length && !preview.value.trim()){
      showError('Choose a file or paste JSON/CSV in the preview area.');
      return;
    }

    let notes = null;

    if(fileInput.files.length){
      const f = fileInput.files[0];
      
      if(f.type === 'application/pdf' || f.name.endsWith('.pdf')){
        showError('PDF sheet music detected. This is stored for the Play session. Manually add notes in JSON/CSV format or use the scanner.');
        return;
      }

      const txt = await f.text();
      notes = parseJSON(txt) || parseCSV(txt);
    } else {
      const txt = preview.value.trim();
      notes = parseJSON(txt) || parseCSV(txt);
    }

    if(!notes || notes.length===0){
      showError('Could not parse notes. Use JSON format {notes: [{time: 0, note: "C4"}, ...]} or CSV format (time,note).');
      currentNotes = null;
      saveBtn.disabled = true;
      return;
    }

    currentNotes = notes;
    const bpm = Number(bpmInput.value) || 120;
    preview.value = JSON.stringify({bpm, notes}, null, 2);
    renderNotesPreview(notes);
    showSuccess(`✓ Parsed ${notes.length} notes at ${bpm} BPM`);
    saveBtn.disabled = false;
    localStorage.setItem('musicCheckerSession', JSON.stringify({bpm, notes}));
  });

  saveBtn.addEventListener('click', ()=>{
    if(currentNotes){
      location.href="{{ url_for('api.play_page') }}";
    }
  });

  preview.addEventListener('blur', ()=>{
    const txt = preview.value.trim();
    if(!txt) return;
    let notes = parseJSON(txt) || parseCSV(txt);
    if(notes && notes.length){
      currentNotes = notes;
      saveBtn.disabled = false;
      localStorage.setItem('musicCheckerSession', JSON.stringify({bpm: Number(bpmInput.value)||120, notes}));
    }
  });

  fileInput.addEventListener('change', ()=>{
    if(fileInput.files[0]){
      messageDiv.innerHTML = '';
    }
  });
</script>
</body>
</html>
