<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bloom Music Checker — Upload</title>
<style>
  :root{
    --paper:#fffefc; --muted:#6b6f76;
    --mint:#8fd19e; --leaf:#2f8a5e; --lavender:#caa6ff; --pink:#ffb6d2; --sun:#ffd27a;
    --shadow:0 18px 50px rgba(10,12,14,0.06);
  }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#f7fbf9,#f3f7ff);color:#123}
  .wrap{max-width:1200px;margin:36px auto;padding:36px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,0.98),rgba(255,255,255,0.95));box-shadow:var(--shadow);position:relative}
  header{display:flex;align-items:center;gap:18px;margin-bottom:18px}
  .brand{width:84px;height:84px;border-radius:14px;background:#ffffff;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(47,138,94,0.18);overflow:hidden;padding:8px;box-sizing:border-box}
  .brand img{width:100%;height:100%;object-fit:contain}
  h2{margin:0;font-size:26px}
  .muted{color:var(--muted);font-size:15px}
  .row{display:flex;gap:14px;align-items:center;margin-top:18px;flex-wrap:wrap}
  input[type=file]{padding:12px;border-radius:12px;border:1px solid rgba(0,0,0,0.04);background:#fff}
  input[type=number]{padding:12px;border-radius:12px;border:1px solid #e6e9ee;width:120px}
  .btn{background:linear-gradient(90deg,var(--lavender),var(--pink));padding:12px 16px;border-radius:12px;border:none;color:#2b1730;font-weight:800;cursor:pointer;font-size:15px}
  .btn.secondary{background:linear-gradient(90deg,var(--sun),#ffd9b3)}
  textarea{width:100%;height:220px;border-radius:14px;padding:16px;border:1px dashed rgba(0,0,0,0.06);margin-top:18px;background:linear-gradient(180deg,#fff,#fbfbff);font-size:15px}
  .notePreview{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-top:18px}
  .noteCard{background:linear-gradient(180deg,#fff,#fffefc);padding:14px;border-radius:12px;border:1px solid rgba(0,0,0,0.03);font-size:15px}
  .back{margin-left:auto;color:var(--muted);text-decoration:none;font-size:15px}
</style>
</head>
<body>
  <main class="wrap">
    <header>
      <div class="brand">
        <img src="RJ_Logo.jpg" alt="Rhythm Judge logo" />
      </div>
      <div>
        <h2>Upload Notes</h2>
        <div class="muted">Supported: JSON with notes array or CSV (time,note). Set BPM if needed.</div>
      </div>
      <a class="back" href="index.html">Back</a>
    </header>

    <div class="row">
      <input id="file" type="file" accept=".json,.csv" />
      <label class="muted" for="bpm">BPM</label>
      <input id="bpm" type="number" value="120" min="20" max="400" />
      <button id="parse" class="btn">Parse</button>
      <button id="save" class="btn secondary">Save & Play</button>
    </div>

    <textarea id="preview" placeholder="Parsed notes preview will appear here"></textarea>

    <div id="notesTable" style="display:none">
      <div style="margin-top:18px;font-weight:700;font-size:16px">Notes Preview</div>
      <div class="notePreview" id="notePreview"></div>
    </div>
  </main>

<script>
  const fileInput = document.getElementById('file');
  const parseBtn = document.getElementById('parse');
  const preview = document.getElementById('preview');
  const bpmInput = document.getElementById('bpm');
  const notePreview = document.getElementById('notePreview');
  const notesTable = document.getElementById('notesTable');
  const saveBtn = document.getElementById('save');

  function parseCSV(text){
    const lines = text.trim().split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    const rows = lines.map(l=>l.split(',').map(s=>s.trim()));
    const notes = [];
    for(let r of rows){
      if(r.length>=2){
        const t = parseFloat(r[0]);
        const n = r[1];
        if(!isNaN(t)) notes.push({time:t,note:n});
      }
    }
    return notes;
  }
  function parseJSON(text){
    try{
      const obj = JSON.parse(text);
      if(Array.isArray(obj.notes)) return obj.notes.map(n=>({time: Number(n.time), note: String(n.note)}));
    }catch(e){}
    return null;
  }

  parseBtn.addEventListener('click', async ()=>{
    if(!fileInput.files.length){ alert('Choose a file or paste content into the preview area.'); return; }
    const f = fileInput.files[0];
    const txt = await f.text();
    let notes = parseJSON(txt);
    if(!notes) notes = parseCSV(txt);
    if(!notes || notes.length===0){ preview.value = 'Could not parse notes. Use JSON or CSV format.'; return; }
    const bpm = Number(bpmInput.value) || 120;
    preview.value = JSON.stringify({bpm, notes}, null, 2);
    notePreview.innerHTML = '';
    notes.forEach((n,i)=>{
      const d = document.createElement('div');
      d.className = 'noteCard';
      d.innerHTML = `<div style="font-weight:700">${n.note}</div><div style="font-size:13px;color:#6b6f76">t=${n.time}s</div>`;
      notePreview.appendChild(d);
    });
    notesTable.style.display = '';
    localStorage.setItem('musicCheckerSession', JSON.stringify({bpm, notes}));
  });

  saveBtn.addEventListener('click', ()=> location.href='play.html');

  preview.addEventListener('blur', ()=>{
    const txt = preview.value.trim();
    if(!txt) return;
    let notes = parseJSON(txt);
    if(!notes) notes = parseCSV(txt);
    if(notes && notes.length) localStorage.setItem('musicCheckerSession', JSON.stringify({bpm: Number(bpmInput.value)||120, notes}));
  });
</script>
</body>
</html>
