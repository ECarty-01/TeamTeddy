<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bloom Music Checker — Upload</title>
<style>
  :root{
    --paper:#fffefc; --muted:#6b6f76;
    --mint:#8fd19e; --leaf:#2f8a5e; --lavender:#caa6ff; --pink:#ffb6d2; --sun:#ffd27a;
    --glass:rgba(255,255,255,0.7); --shadow:0 10px 30px rgba(10,12,14,0.08);
  }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#f7fbf9,#f3f7ff);color:#123}
  .wrap{max-width:980px;margin:28px auto;padding:22px;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,0.95),rgba(255,255,255,0.9));box-shadow:var(--shadow);position:relative;overflow:hidden}
  h2{margin:0 0 6px}
  .muted{color:var(--muted)}
  .row{display:flex;gap:12px;align-items:center;margin-top:12px;flex-wrap:wrap}
  input[type=file]{padding:8px}
  input[type=number]{padding:8px;border-radius:8px;border:1px solid #e6e9ee}
  .btn{background:linear-gradient(90deg,var(--lavender),var(--pink));padding:10px 14px;border-radius:10px;border:none;color:#2b1730;font-weight:700;cursor:pointer}
  textarea{width:100%;height:160px;border-radius:10px;padding:12px;border:1px dashed rgba(0,0,0,0.06);margin-top:12px;background:linear-gradient(180deg,#fff,#fbfbff)}
  table{width:100%;border-collapse:collapse;margin-top:12px}
  th,td{padding:8px;border-bottom:1px solid rgba(0,0,0,0.04);font-size:14px}
  .notePreview{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:12px}
  .noteCard{background:linear-gradient(180deg,#fff,#fffefc);padding:10px;border-radius:10px;border:1px solid rgba(0,0,0,0.03)}
  .back{margin-left:auto;color:var(--muted);text-decoration:none}
</style>
</head>
<body>
  <main class="wrap">
    <header style="display:flex;align-items:center;gap:12px">
      <div style="width:64px;height:64px;border-radius:12px;background:linear-gradient(135deg,var(--mint),var(--leaf));display:flex;align-items:center;justify-content:center;color:white;font-weight:700">B</div>
      <div>
        <h2>Upload Notes</h2>
        <div class="muted">Supported: JSON with notes array or CSV (time,note). Set BPM if needed.</div>
      </div>
      <a class="back" href="index.html">Back</a>
    </header>

    <div class="row">
      <input id="file" type="file" accept=".json,.csv" />
      <label class="muted" for="bpm">BPM</label>
      <input id="bpm" type="number" value="120" min="20" max="400" />
      <button id="parse" class="btn">Parse</button>
      <button id="save" class="btn" style="background:linear-gradient(90deg,var(--sun),#ffd9b3);">Save & Play</button>
    </div>

    <textarea id="preview" placeholder="Parsed notes preview will appear here"></textarea>

    <div id="notesTable" style="display:none">
      <div style="margin-top:12px;font-weight:600">Notes Preview</div>
      <div class="notePreview" id="notePreview"></div>
    </div>
  </main>

<script>
  const fileInput = document.getElementById('file');
  const parseBtn = document.getElementById('parse');
  const preview = document.getElementById('preview');
  const bpmInput = document.getElementById('bpm');
  const notePreview = document.getElementById('notePreview');
  const notesTable = document.getElementById('notesTable');
  const saveBtn = document.getElementById('save');

  function parseCSV(text){
    const lines = text.trim().split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    const rows = lines.map(l=>l.split(',').map(s=>s.trim()));
    const notes = [];
    for(let r of rows){
      if(r.length>=2){
        const t = parseFloat(r[0]);
        const n = r[1];
        if(!isNaN(t)) notes.push({time:t,note:n});
      }
    }
    return notes;
  }
  function parseJSON(text){
    try{
      const obj = JSON.parse(text);
      if(Array.isArray(obj.notes)) return obj.notes.map(n=>({time: Number(n.time), note: String(n.note)}));
    }catch(e){}
    return null;
  }

  parseBtn.addEventListener('click', async ()=>{
    if(!fileInput.files.length){ alert('Choose a file or paste content into the preview area.'); return; }
    const f = fileInput.files[0];
    const txt = await f.text();
    let notes = parseJSON(txt);
    if(!notes) notes = parseCSV(txt);
    if(!notes || notes.length===0){ preview.value = 'Could not parse notes. Use JSON or CSV format.'; return; }
    const bpm = Number(bpmInput.value) || 120;
    preview.value = JSON.stringify({bpm, notes}, null, 2);
    notePreview.innerHTML = '';
    notes.forEach((n,i)=>{
      const d = document.createElement('div');
      d.className = 'noteCard';
      d.innerHTML = `<div style="font-weight:600">${n.note}</div><div style="font-size:13px;color:#6b6f76">t=${n.time}s</div>`;
      notePreview.appendChild(d);
    });
    notesTable.style.display = '';
    localStorage.setItem('musicCheckerSession', JSON.stringify({bpm, notes}));
  });

  saveBtn.addEventListener('click', ()=> location.href='play.html');

  preview.addEventListener('blur', ()=>{
    const txt = preview.value.trim();
    if(!txt) return;
    let notes = parseJSON(txt);
    if(!notes) notes = parseCSV(txt);
    if(notes && notes.length) localStorage.setItem('musicCheckerSession', JSON.stringify({bpm: Number(bpmInput.value)||120, notes}));
  });
</script>
</body>
</html>
